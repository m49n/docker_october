name: october-production

x-app-image: &app-image ${APP_IMAGE:-registry.example.com/project/october-app}:${IMAGE_TAG:-latest}
x-nginx-image: &nginx-image ${NGINX_IMAGE:-registry.example.com/project/october-nginx}:${IMAGE_TAG:-latest}

x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "3"

x-app-service: &app-service
  image: *app-image
  env_file:
    - .env
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped
  logging: *default-logging
  volumes:
    - storage-app:/var/www/html/storage/app

services:
  nginx:
    image: *nginx-image
    depends_on:
      php-fpm:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - storage-app:/var/www/html/storage/app:ro

  php-fpm:
    <<: *app-service
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  queue:
    <<: *app-service
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120 --max-time=3600 --memory=128
    stop_grace_period: 130s

  scheduler:
    <<: *app-service
    command: php artisan schedule:work
    stop_grace_period: 70s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    profiles:
      - local-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-october}
      POSTGRES_USER: ${POSTGRES_USER:-october}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *default-logging

volumes:
  redis-data:
  storage-app:
  postgres-data:
