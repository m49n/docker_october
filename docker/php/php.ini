expose_php = Off

memory_limit = 128M
upload_max_filesize = 32M
post_max_size = 40M
max_execution_time = 120
max_input_vars = 10000

display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

realpath_cache_size = 4096K
realpath_cache_ttl = 600

cgi.fix_pathinfo = 0

date.timezone = Europe/Moscow
