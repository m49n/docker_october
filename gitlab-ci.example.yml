image: alpine:3.22

stages:
  - deploy

deploy_production:
  stage: deploy
  environment:
    name: production
  before_script:
    - apk add --no-cache openssh-client curl
    - chmod +x scripts/ci-deploy-over-ssh.sh scripts/telegram-notify.sh
  script:
    - ./scripts/ci-deploy-over-ssh.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
